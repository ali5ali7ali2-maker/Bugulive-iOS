      - name: Fix non-ASCII folder name mismatches
        if: always()
        continue-on-error: true
        run: |
          set +e
          LOG=/tmp/fix-nonascii.log
          echo "=== Fix non-ASCII directory names ===" > "$LOG"
          echo "date: $(date)" >> "$LOG"
          echo "CWD: $(pwd)" >> "$LOG"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE" >> "$LOG"

          python3 - >> "$LOG" 2>&1 << 'PYEOF'
          import os, unicodedata, sys

          def nfc(s):
              return unicodedata.normalize('NFC', s)

          print('Python:', sys.version)
          print('CWD:', os.getcwd())

          # (parent_dir, garbled_prefix, correct_name)
          FIXES = [
              ('BuguLive/Class/Sections',                          'DT_Controller(',   'DT_Controller(\u52a8\u6001)'),
              ('BuguLive/Class/Sections',                          'YounthMode(',      'YounthMode(\u9752\u5c11\u5e74\u6a21\u5f0f)'),
              ('BuguLive/Class/Sections/Home/V3NewUIController',   'BogoNewNoble(',    'BogoNewNoble(\u8d35\u65cf)'),
              ('BuguLive/Class/Sections/Home/V3NewUIController',   'BogoSquare(',      'BogoSquare(\u5e7f\u573a)'),
              ('BuguLive/Class/Sections/Login',                    'Register(',        'Register(\u6ce8\u518c)'),
              ('BuguLive/Class/Live/LiveUI/View/OtherView',        'Shop(',            'Shop(\u8d2d\u7269\u8f66)'),
              ('BuguLive/Class/Live/LiveUI/View/OtherView',        'VIP(',             'VIP(\u8d35\u65cf\u5217\u8868)'),
              ('BuguLive/Class/Live/LiveUI/View/OtherView',        'Wish(',            'Wish(\u5fc3\u613f\u5355)'),
          ]

          for parent, prefix, correct in FIXES:
              if not os.path.isdir(parent):
                  print(f'SKIP (no parent): {parent}')
                  continue
              entries = os.listdir(parent)
              print(f'Listing {parent}: {len(entries)} entries')
              for name in entries:
                  nname = nfc(name)
                  if not nname.startswith(prefix):
                      continue
                  if nname == correct:
                      print(f'ALREADY OK: {os.path.join(parent, name)}')
                      break
                  src = os.path.join(parent, name)
                  dst = os.path.join(parent, correct)
                  print(f'RENAMING: {src!r}')
                  print(f'      TO: {dst!r}')
                  try:
                      os.rename(src, dst)
                      print('SUCCESS')
                  except Exception as e:
                      print(f'FAILED: {e}')
                  break

          # Fix BogoTimeLine inside DT_Controller(动态)
          dt = 'BuguLive/Class/Sections/DT_Controller(\u52a8\u6001)'
          bt_correct = 'BogoTimeLine(\u65b0\u7248\u52a8\u6001)'
          if os.path.isdir(dt):
              print(f'DT dir exists: {dt}')
              for name in os.listdir(dt):
                  nname = nfc(name)
                  if not nname.startswith('BogoTimeLine('):
                      continue
                  if nname == bt_correct:
                      print(f'BogoTimeLine ALREADY OK: {name}')
                      break
                  src = os.path.join(dt, name)
                  dst = os.path.join(dt, bt_correct)
                  print(f'RENAMING BogoTimeLine: {src!r} -> {dst!r}')
                  try:
                      os.rename(src, dst)
                      print('SUCCESS')
                  except Exception as e:
                      print(f'FAILED: {e}')
                  break
          else:
              print(f'DT dir NOT found: {dt}')

          print('=== DONE ===')
          PYEOF

          cp "$LOG" "$GITHUB_WORKSPACE/symlink-debug.log" 2>/dev/null || true
          cat "$LOG" || true

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          rm -rf build.xcresult

          xcodebuild \
            -workspace BuguLive.xcworkspace \
            -scheme BuguLive \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -resultBundlePath build.xcresult \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            VALID_ARCHS=arm64 \
            EXCLUDED_ARCHS="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=NO \
            CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES \
            CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            'HEADER_SEARCH_PATHS=$(inherited) /tmp/ci_headers' \
            clean build 2>&1 | tee ios-build.log

      - name: Print error summary
        if: failure()
        run: |
          echo "================ XCODE ERROR SUMMARY ================"
          grep -n -i -E "error:|fatal error:|BUILD FAILED|framework not found|file not found|No such module|Undefined symbols|ld:|clang: error|Command .* failed" ios-build.log | tail -500 || true
          echo "====================================================="

      - name: Export xcresult JSON
        if: always()
        run: |
          if [ -d build.xcresult ]; then
            xcrun xcresulttool get --legacy --format json --path build.xcresult > xcresult.json 2>/dev/null || \
            xcrun xcresulttool get --format json --path build.xcresult > xcresult.json 2>/dev/null || true
          fi

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifacts
          path: |
            ios-build.log
            xcresult.json
            build.xcresult
            symlink-debug.log
          if-no-files-found: warn