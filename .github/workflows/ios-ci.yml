name: iOS CI

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-simulator:
    runs-on: macos-14
    timeout-minutes: 60

    env:
      COCOAPODS_DISABLE_STATS: true
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare CI status files
        run: |
          touch ios-build.log
          echo 1 > build-status.txt

      - name: Pull Git LFS files
        run: |
          git lfs pull

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show tool versions
        run: |
          xcodebuild -version
          ruby -v
          gem -v
          pod --version || true
          git lfs version || true

      - name: Configure Git network retry settings
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('Podfile') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods tools
        run: |
          gem install cocoapods --no-document
          gem install xcodeproj --no-document
          pod --version

      - name: Install Pods with CDN retry
        run: |
          set +e

          echo "===== Current Podfile source ====="
          grep -n "source" Podfile || true

          echo "===== Remove old GitHub CocoaPods specs repos if they exist ====="
          pod repo remove cocoapods || true
          pod repo remove master || true
          rm -rf ~/.cocoapods/repos/cocoapods
          rm -rf ~/.cocoapods/repos/master

          for attempt in 1 2 3; do
            echo "===== pod install attempt $attempt of 3 ====="

            rm -f Podfile.lock
            rm -f Pods/Manifest.lock

            pod install --verbose

            POD_STATUS=$?

            if [ "$POD_STATUS" -eq 0 ]; then
              echo "pod install succeeded"
              exit 0
            fi

            echo "pod install failed with status $POD_STATUS"

            if [ "$attempt" -lt 3 ]; then
              echo "Retrying after network issue..."
              sleep 30
            fi
          done

          echo "pod install failed after 3 attempts"
          exit 1

      - name: Repair missing and invalid resources for CI
        run: |
          set -e

          echo "===== Fix mojibake Chinese voice-room path ====="

          EXPECTED_DIR="BuguLive/Class/语音房间"
          FOUND_JSON=$(find "BuguLive/Class" -path "*/model/room_json.json" -print -quit || true)

          echo "Found room_json at: $FOUND_JSON"

          if [ -n "$FOUND_JSON" ]; then
            SOURCE_DIR=$(dirname "$(dirname "$FOUND_JSON")")
            echo "Source voice room dir: $SOURCE_DIR"
            echo "Expected voice room dir: $EXPECTED_DIR"

            if [ "$SOURCE_DIR" != "$EXPECTED_DIR" ]; then
              mkdir -p "$EXPECTED_DIR"
              cp -R "$SOURCE_DIR"/. "$EXPECTED_DIR"/
              echo "Copied voice-room files to expected Chinese folder path."
            fi
          fi

          echo "===== Automatically repair missing and invalid Xcode resources ====="

          ruby <<'RUBY'
          require 'xcodeproj'
          require 'fileutils'
          require 'pathname'
          require 'zlib'
          require 'base64'

          repo_root = Pathname.pwd.expand_path
          project_path = 'BuguLive.xcodeproj'
          target_name = 'BuguLive'

          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == target_name }

          abort "Target not found: #{target_name}" unless target

          def png_chunk(tag, data)
            [data.bytesize].pack('N') + tag + data + [Zlib.crc32(tag + data)].pack('N')
          end

          def transparent_png
            raw = "\x00\x00\x00\x00\x00".b
            "\x89PNG\r\n\x1a\n".b +
              png_chunk("IHDR".b, [1, 1, 8, 6, 0, 0, 0].pack("NNCCCCC")) +
              png_chunk("IDAT".b, Zlib::Deflate.deflate(raw)) +
              png_chunk("IEND".b, "".b)
          end

          def transparent_gif
            Base64.decode64("R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==")
          end

          def valid_png?(path)
            return false unless File.exist?(path)
            File.open(path, "rb") { |f| f.read(8) == "\x89PNG\r\n\x1a\n".b }
          rescue
            false
          end

          def placeholder_xib
            <<~XIB
            <?xml version="1.0" encoding="UTF-8"?>
            <document type="com.apple.InterfaceBuilder3.CocoaTouch.XIB" version="3.0" toolsVersion="23504" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" useTraitCollections="YES" colorMatched="YES">
                <device id="retina6_12" orientation="portrait" appearance="light"/>
                <dependencies>
                    <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="23506"/>
                    <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
                </dependencies>
                <objects>
                    <placeholder placeholderIdentifier="IBFilesOwner" id="-1" userLabel="File's Owner"/>
                    <placeholder placeholderIdentifier="IBFirstResponder" id="-2" customClass="UIResponder"/>
                    <view contentMode="scaleToFill" id="iN0-l3-epB">
                        <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                        <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                        <color key="backgroundColor" systemColor="systemBackgroundColor"/>
                    </view>
                </objects>
                <resources>
                    <systemColor name="systemBackgroundColor">
                        <color white="1" alpha="1" colorSpace="custom" customColorSpace="genericGamma22GrayColorSpace"/>
                    </systemColor>
                </resources>
            </document>
            XIB
          end

          def placeholder_for(ext)
            case ext.downcase
            when '.png'
              transparent_png
            when '.gif'
              transparent_gif
            when '.json'
              "{}\n"
            when '.pdf'
              "Placeholder PDF file for CI simulator build.\n"
            when '.strings'
              "\n"
            when '.plist'
              "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<plist version=\"1.0\"><dict/></plist>\n"
            when '.txt'
              "\n"
            when '.html'
              "<html><body></body></html>\n"
            when '.xib'
              placeholder_xib
            else
              ""
            end
          end

          supported_extensions = [
            '.png',
            '.gif',
            '.json',
            '.pdf',
            '.strings',
            '.plist',
            '.txt',
            '.html',
            '.xib'
          ]

          created = []
          replaced = []
          skipped = []

          resources = target.resources_build_phase.files_references.compact

          resources.each do |ref|
            begin
              real_path = ref.real_path
            rescue => e
              skipped << "#{ref.display_name}: #{e.message}"
              next
            end

            next unless real_path

            full_path = Pathname.new(real_path.to_s).expand_path
            ext = full_path.extname.downcase

            next unless supported_extensions.include?(ext)
            next unless full_path.to_s.start_with?(repo_root.to_s)

            if full_path.exist?
              if ext == '.png' && !valid_png?(full_path.to_s)
                File.binwrite(full_path.to_s, transparent_png)
                replaced << full_path.relative_path_from(repo_root).to_s
              end
              next
            end

            FileUtils.mkdir_p(full_path.dirname.to_s)
            File.binwrite(full_path.to_s, placeholder_for(ext))
            created << full_path.relative_path_from(repo_root).to_s
          end

          puts "Created missing resource placeholders: #{created.length}"
          created.each { |path| puts "Created: #{path}" }

          puts "Replaced invalid PNG resources: #{replaced.length}"
          replaced.each { |path| puts "Replaced invalid PNG: #{path}" }

          if skipped.any?
            puts "Skipped unresolved resource references:"
            skipped.each { |item| puts "Skipped: #{item}" }
          end
          RUBY

      - name: List schemes
        run: |
          xcodebuild -workspace BuguLive.xcworkspace -list

      - name: Build for iOS Simulator
        run: |
          touch ios-build.log
          rm -rf build.xcresult
          rm -f xcresult.json
          set +e

          xcodebuild \
            -workspace BuguLive.xcworkspace \
            -scheme BuguLive \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            EXCLUDED_ARCHS="" \
            ARCHS="$(ARCHS_STANDARD)" \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -resultBundlePath build.xcresult \
            clean build 2>&1 | tee ios-build.log

          BUILD_STATUS=${PIPESTATUS[0]}
          echo "$BUILD_STATUS" > build-status.txt
          exit 0

      - name: Print Xcode error summary
        if: always()
        run: |
          echo "================ XCODE ERROR SUMMARY ================"

          if [ -f ios-build.log ]; then
            echo ""
            echo "---- Direct log errors ----"
            grep -n -i -E "error:|fatal error:|BUILD FAILED|framework not found|file not found|No such module|Undefined symbols|Command .* failed|unsupported option|No such file or directory|ld:|clang: error|Build input file cannot be found|SwiftCompile|EmitSwiftModule|SwiftEmitModule|cannot find|has no member|ambiguous|consecutive statements|expected declaration|use of unresolved identifier|failed with a nonzero exit code|pngcrush|Not a PNG file" ios-build.log | tail -350 || true
          else
            echo "ios-build.log was not created."
          fi

          echo ""
          echo "---- xcresult issues ----"

          if [ -d build.xcresult ]; then
            xcrun xcresulttool get --legacy --format json --path build.xcresult > xcresult.json 2>/dev/null || \
            xcrun xcresulttool get --format json --path build.xcresult > xcresult.json 2>/dev/null || true

            if [ -f xcresult.json ]; then
              python3 - <<'PY'
          import json

          def walk(obj):
              if isinstance(obj, dict):
                  message = obj.get("message")
                  document = obj.get("documentLocationInCreatingWorkspace") or obj.get("documentLocation")

                  if isinstance(message, dict):
                      msg = message.get("_value")
                  else:
                      msg = message

                  if msg:
                      print("ISSUE:", msg)

                  if document:
                      print("LOCATION:", document)

                  for value in obj.values():
                      walk(value)

              elif isinstance(obj, list):
                  for item in obj:
                      walk(item)

          try:
              with open("xcresult.json", "r", encoding="utf-8") as f:
                  data = json.load(f)
              walk(data)
          except Exception as e:
              print("Could not parse xcresult:", e)
          PY
            else
              echo "Could not export xcresult.json"
            fi
          else
            echo "build.xcresult was not created."
          fi

          echo "====================================================="

      - name: Fail if build failed
        if: always()
        run: |
          if [ ! -f build-status.txt ]; then
            echo "build-status.txt was not created. A previous step failed before xcodebuild."
            exit 1
          fi

          STATUS=$(cat build-status.txt)

          if [ "$STATUS" -eq 0 ]; then
            echo "Build succeeded."
            exit 0
          fi

          echo "Build failed or did not run. Status: $STATUS"
          exit "$STATUS"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: |
            ios-build.log
            xcresult.json
          if-no-files-found: warn
