name: iOS CI

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-simulator:
    runs-on: macos-14
    timeout-minutes: 60

    env:
      COCOAPODS_DISABLE_STATS: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare CI status files
        run: |
          touch ios-build.log
          echo 1 > build-status.txt

      - name: Pull Git LFS files
        run: |
          git lfs pull

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show tool versions
        run: |
          xcodebuild -version
          ruby -v
          gem -v
          pod --version || true
          git lfs version || true

      - name: Configure Git network retry settings
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('Podfile') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document
          gem install xcodeproj --no-document
          pod --version

      - name: Install Pods with retry
        run: |
          set +e

          for attempt in 1 2 3; do
            echo "===== pod install attempt $attempt of 3 ====="

            rm -f Podfile.lock
            rm -f Pods/Manifest.lock

            pod install --repo-update

            POD_STATUS=$?

            if [ "$POD_STATUS" -eq 0 ]; then
              echo "pod install succeeded"
              exit 0
            fi

            echo "pod install failed with status $POD_STATUS"

            if [ "$attempt" -lt 3 ]; then
              echo "Retrying after network reset..."
              sleep 30
            fi
          done

          echo "pod install failed after 3 attempts"
          exit 1

      - name: Repair missing resources for CI
        run: |
          set -e

          echo "===== Fix mojibake Chinese voice-room path ====="

          EXPECTED_DIR="BuguLive/Class/语音房间"
          FOUND_JSON=$(find "BuguLive/Class" -path "*/model/room_json.json" -print -quit || true)

          echo "Found room_json at: $FOUND_JSON"

          if [ -n "$FOUND_JSON" ]; then
            SOURCE_DIR=$(dirname "$(dirname "$FOUND_JSON")")
            echo "Source voice room dir: $SOURCE_DIR"
            echo "Expected voice room dir: $EXPECTED_DIR"

            if [ "$SOURCE_DIR" != "$EXPECTED_DIR" ]; then
              mkdir -p "$EXPECTED_DIR"
              cp -R "$SOURCE_DIR"/. "$EXPECTED_DIR"/
              echo "Copied voice-room files to expected Chinese folder path."
            fi
          fi

          if [ -d "$EXPECTED_DIR/model" ]; then
            ls -la "$EXPECTED_DIR/model"
          else
            echo "Warning: expected model folder does not exist: $EXPECTED_DIR/model"
          fi

          echo "===== Create missing UMeng PDF placeholder ====="

          PDF_DIR="BuguLive/Others/Vendors/UMengs/common/common_ios_7.3.5"
          PDF_FILE="$PDF_DIR/iOS集成升级必读.pdf"

          mkdir -p "$PDF_DIR"

          if [ ! -f "$PDF_FILE" ]; then
            echo "Creating placeholder PDF: $PDF_FILE"
            printf '%s\n' "Placeholder PDF file for CI simulator build." > "$PDF_FILE"
          else
            echo "Exists: $PDF_FILE"
          fi

          echo "===== Automatically create missing Xcode resources ====="

          ruby <<'RUBY'
          require 'xcodeproj'
          require 'fileutils'
          require 'pathname'
          require 'zlib'
          require 'base64'

          repo_root = Pathname.pwd.expand_path
          project_path = 'BuguLive.xcodeproj'
          target_name = 'BuguLive'

          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == target_name }

          abort "Target not found: #{target_name}" unless target

          def png_chunk(tag, data)
            [data.bytesize].pack('N') + tag + data + [Zlib.crc32(tag + data)].pack('N')
          end

          def transparent_png
            raw = "\x00\x00\x00\x00\x00".b
            "\x89PNG\r\n\x1a\n".b +
              png_chunk("IHDR".b, [1, 1, 8, 6, 0, 0, 0].pack("NNCCCCC")) +
              png_chunk("IDAT".b, Zlib::Deflate.deflate(raw)) +
              png_chunk("IEND".b, "".b)
          end

          def transparent_gif
            Base64.decode64("R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==")
          end

          def placeholder_for(ext)
            case ext.downcase
            when '.png'
              transparent_png
            when '.gif'
              transparent_gif
            when '.json'
              "{}\n"
            when '.pdf'
              "Placeholder PDF file for CI simulator build.\n"
            when '.strings'
              "\n"
            when '.plist'
              "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<plist version=\"1.0\"><dict/></plist>\n"
            else
              ""
            end
          end

          supported_extensions = [
            '.png',
            '.gif',
            '.json',
            '.pdf',
            '.strings',
            '.plist'
          ]

          created = []
          skipped = []

          resources = target.resources_build_phase.files_references.compact

          resources.each do |ref|
            begin
              real_path = ref.real_path
            rescue => e
              skipped << "#{ref.display_name}: #{e.message}"
              next
            end

            next unless real_path

            full_path = Pathname.new(real_path.to_s).expand_path
            ext = full_path.extname.downcase

            next unless supported_extensions.include?(ext)
            next unless full_path.to_s.start_with?(repo_root.to_s)
            next if full_path.exist?

            FileUtils.mkdir_p(full_path.dirname.to_s)
            File.binwrite(full_path.to_s, placeholder_for(ext))
            created << full_path.relative_path_from(repo_root).to_s
          end

          puts "Created missing resource placeholders: #{created.length}"

          created.each do |path|
            puts "Created: #{path}"
          end

          if skipped.any?
            puts "Skipped unresolved resource references:"
            skipped.each { |item| puts "Skipped: #{item}" }
          end
          RUBY

      - name: List schemes
        run: |
          xcodebuild -workspace BuguLive.xcworkspace -list

      - name: Build for iOS Simulator
        run: |
          touch ios-build.log
          set +e

          xcodebuild \
            -workspace BuguLive.xcworkspace \
            -scheme BuguLive \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            'EXCLUDED_ARCHS[sdk=iphonesimulator*]=' \
            'ARCHS=$(ARCHS_STANDARD)' \
            ONLY_ACTIVE_ARCH=NO \
            clean build 2>&1 | tee ios-build.log

          BUILD_STATUS=${PIPESTATUS[0]}
          echo "$BUILD_STATUS" > build-status.txt
          exit 0

      - name: Print Xcode error summary
        if: always()
        run: |
          echo "================ XCODE ERROR SUMMARY ================"

          if [ -f ios-build.log ]; then
            grep -n -i -E "error:|fatal error:|BUILD FAILED|framework not found|file not found|No such module|Undefined symbols|Command .* failed|unsupported option|No such file or directory|ld:|clang: error|Build input file cannot be found" ios-build.log | tail -220 || true
          else
            echo "ios-build.log was not created because the build step did not run."
          fi

          echo "====================================================="

      - name: Fail if build failed
        if: always()
        run: |
          if [ ! -f build-status.txt ]; then
            echo "build-status.txt was not created. A previous step failed before xcodebuild."
            exit 1
          fi

          STATUS=$(cat build-status.txt)

          if [ "$STATUS" -eq 0 ]; then
            echo "Build succeeded."
            exit 0
          fi

          echo "Build failed or did not run. Status: $STATUS"
          exit "$STATUS"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ios-build.log
          if-no-files-found: warn
