name: iOS CI

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-simulator:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show tool versions
        run: |
          xcodebuild -version
          ruby -v
          pod --version || true

      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document
          pod --version

      - name: Install Pods
        run: |
          rm -f Podfile.lock
          rm -f Pods/Manifest.lock
          pod install --repo-update

      - name: Fix mojibake Chinese folder path
        run: |
          set -e

          EXPECTED_DIR="BuguLive/Class/语音房间"
          FOUND_JSON=$(find "BuguLive/Class" -path "*/model/room_json.json" -print -quit)

          echo "Found room_json at: $FOUND_JSON"

          if [ -n "$FOUND_JSON" ]; then
            SOURCE_DIR=$(dirname "$(dirname "$FOUND_JSON")")
            echo "Source voice room dir: $SOURCE_DIR"
            echo "Expected voice room dir: $EXPECTED_DIR"

            if [ "$SOURCE_DIR" != "$EXPECTED_DIR" ]; then
              mkdir -p "$EXPECTED_DIR"
              cp -R "$SOURCE_DIR"/. "$EXPECTED_DIR"/
              echo "Copied files to expected Chinese folder path."
            fi
          fi

          echo "Checking expected model folder:"
          ls -la "$EXPECTED_DIR/model"

      - name: Create missing UMeng PDF placeholder
        run: |
          set -e

          PDF_DIR="BuguLive/Others/Vendors/UMengs/common/common_ios_7.3.5"
          PDF_FILE="$PDF_DIR/iOS集成升级必读.pdf"

          mkdir -p "$PDF_DIR"

          if [ ! -f "$PDF_FILE" ]; then
            echo "Creating placeholder PDF: $PDF_FILE"
            cat > "$PDF_FILE" <<'EOF'
          %PDF-1.4
          1 0 obj
          << /Type /Catalog /Pages 2 0 R >>
          endobj
          2 0 obj
          << /Type /Pages /Kids [3 0 R] /Count 1 >>
          endobj
          3 0 obj
          << /Type /Page /Parent 2 0 R /MediaBox [0 0 200 200] >>
          endobj
          xref
          0 4
          0000000000 65535 f
          0000000009 00000 n
          0000000058 00000 n
          0000000115 00000 n
          trailer
          << /Size 4 /Root 1 0 R >>
          startxref
          186
          %%EOF
          EOF
          fi

          ls -la "$PDF_DIR"

      - name: List schemes
        run: xcodebuild -workspace BuguLive.xcworkspace -list

      - name: Build for iOS Simulator
        run: |
          touch ios-build.log
          set +e

          xcodebuild \
            -workspace BuguLive.xcworkspace \
            -scheme BuguLive \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            clean build 2>&1 | tee ios-build.log

          echo ${PIPESTATUS[0]} > build-status.txt

      - name: Print Xcode error summary
        if: always()
        run: |
          echo "================ XCODE ERROR SUMMARY ================"
          grep -n -i -E "error:|fatal error:|BUILD FAILED|framework not found|file not found|No such module|Undefined symbols|Command .* failed|unsupported option|No such file or directory|ld:|clang: error" ios-build.log | tail -150 || true
          echo "====================================================="

      - name: Fail if build failed
        if: always()
        run: |
          STATUS=$(cat build-status.txt)
          exit $STATUS

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ios-build.log
          if-no-files-found: warn
