- (QAnnotationView *)dequeueReusableAnnotationViewWithIdentifier:(NSString *)identifier;
@end

@interface QUserLocation : NSObject
@property (nonatomic, strong) CLLocation *location;
@property (nonatomic, readonly) CLLocationCoordinate2D coordinate;
@end

@interface QPointAnnotation : NSObject <QAnnotation>
@property (nonatomic) CLLocationCoordinate2D coordinate;
@property (nonatomic, copy) NSString *title;
@property (nonatomic, copy) NSString *subtitle;
@end

@interface QAnnotationView : UIView
@property (nonatomic, strong) id<QAnnotation> annotation;
@property (nonatomic, copy) NSString *reuseIdentifier;
@property (nonatomic, strong) UIImage *image;
@property (nonatomic) CGPoint centerOffset;
@property (nonatomic) BOOL canShowCallout;
@property (nonatomic) BOOL draggable;
- (instancetype)initWithAnnotation:(id<QAnnotation>)annotation reuseIdentifier:(NSString *)reuseIdentifier;
@end

@interface QPinAnnotationView : QAnnotationView
@property (nonatomic) BOOL animatesDrop;
@property (nonatomic, strong) UIColor *pinColor;
@end

@interface QMapSearch : NSObject
@property (nonatomic, weak) id delegate;
@end

@interface QMapLocationManager : NSObject
@property (nonatomic, weak) id delegate;
- (void)startUpdatingLocation;
- (void)stopUpdatingLocation;
@end

@interface QPolyline : NSObject
@end

@interface QPolygon : NSObject
@end

@interface QCircle : NSObject
@end

@interface QOverlayRenderer : NSObject
@end

@interface QOverlayPathRenderer : QOverlayRenderer
@end

#endif
EOF

          cat > "$QMAP_FRAMEWORK/Modules/module.modulemap" <<'EOF'
framework module QMapKit {
  umbrella header "QMapKit.h"
  export *
  module * { export * }
}
EOF

          cat > /tmp/QMapKitStub.m <<'EOF'
#import "QMapKit.h"

@implementation QMapServices
+ (instancetype)sharedServices {
    static QMapServices *service;
    static dispatch_once_t onceToken;
    dispatch_once(&onceToken, ^{
        service = [QMapServices new];
    });
    return service;
}
@end

@implementation QMapView
- (instancetype)initWithFrame:(CGRect)frame {
    self = [super initWithFrame:frame];
    return self;
}
- (void)setCenterCoordinate:(CLLocationCoordinate2D)coordinate animated:(BOOL)animated {
    _centerCoordinate = coordinate;
}
- (void)addAnnotation:(id<QAnnotation>)annotation {}
- (void)addAnnotations:(NSArray *)annotations {}
- (void)removeAnnotation:(id<QAnnotation>)annotation {}
- (void)removeAnnotations:(NSArray *)annotations {}
- (QAnnotationView *)viewForAnnotation:(id<QAnnotation>)annotation { return nil; }
- (QAnnotationView *)dequeueReusableAnnotationViewWithIdentifier:(NSString *)identifier { return nil; }
@end

@implementation QUserLocation
- (CLLocationCoordinate2D)coordinate {
    return self.location ? self.location.coordinate : kCLLocationCoordinate2DInvalid;
}
@end

@implementation QPointAnnotation
@end

@implementation QAnnotationView
- (instancetype)initWithAnnotation:(id<QAnnotation>)annotation reuseIdentifier:(NSString *)reuseIdentifier {
    self = [super initWithFrame:CGRectZero];
    if (self) {
        _annotation = annotation;
        _reuseIdentifier = [reuseIdentifier copy];
    }
    return self;
}
@end

@implementation QPinAnnotationView
@end

@implementation QMapSearch
@end

@implementation QMapLocationManager
- (void)startUpdatingLocation {}
- (void)stopUpdatingLocation {}
@end

@implementation QPolyline
@end

@implementation QPolygon
@end

@implementation QCircle
@end

@implementation QOverlayRenderer
@end

@implementation QOverlayPathRenderer
@end
EOF

          SDK_PATH="$(xcrun --sdk iphonesimulator --show-sdk-path)"

          clang \
            -fobjc-arc \
            -dynamiclib \
            -target arm64-apple-ios12.0-simulator \
            -isysroot "$SDK_PATH" \
            -I "$QMAP_FRAMEWORK/Headers" \
            /tmp/QMapKitStub.m \
            -framework Foundation \
            -framework UIKit \
            -framework CoreLocation \
            -install_name "@rpath/QMapKit.framework/QMapKit" \
            -o "$QMAP_FRAMEWORK/QMapKit"

          cat > "$QMAP_FRAMEWORK/Info.plist" <<'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleDevelopmentRegion</key>
    <string>en</string>
    <key>CFBundleExecutable</key>
    <string>QMapKit</string>
    <key>CFBundleIdentifier</key>
    <string>com.ci.stub.QMapKit</string>
    <key>CFBundleInfoDictionaryVersion</key>
    <string>6.0</string>
    <key>CFBundleName</key>
    <string>QMapKit</string>
    <key>CFBundlePackageType</key>
    <string>FMWK</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0</string>
    <key>CFBundleVersion</key>
    <string>1</string>
    <key>MinimumOSVersion</key>
    <string>12.0</string>
</dict>
</plist>
EOF

          echo "QMapKit framework files:"
          find "$QMAP_FRAMEWORK" -maxdepth 3 -type f -print

          echo "===== Automatically repair missing and invalid Xcode resources ====="

          ruby <<'RUBY'
          require 'xcodeproj'
          require 'fileutils'
          require 'pathname'
          require 'zlib'
          require 'base64'

          repo_root = Pathname.pwd.expand_path
          project_path = 'BuguLive.xcodeproj'
          target_name = 'BuguLive'

          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == target_name }

          abort "Target not found: #{target_name}" unless target

          def png_chunk(tag, data)
            [data.bytesize].pack('N') + tag + data + [Zlib.crc32(tag + data)].pack('N')
          end

          def transparent_png
            raw = "\x00\x00\x00\x00\x00".b
            "\x89PNG\r\n\x1a\n".b +
              png_chunk("IHDR".b, [1, 1, 8, 6, 0, 0, 0].pack("NNCCCCC")) +
              png_chunk("IDAT".b, Zlib::Deflate.deflate(raw)) +
              png_chunk("IEND".b, "".b)
          end

          def transparent_gif
            Base64.decode64("R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==")
          end

          def valid_png?(path)
            return false unless File.exist?(path)
            File.open(path, "rb") { |f| f.read(8) == "\x89PNG\r\n\x1a\n".b }
          rescue
            false
          end

          def placeholder_xib
            <<~XIB
            <?xml version="1.0" encoding="UTF-8"?>
            <document type="com.apple.InterfaceBuilder3.CocoaTouch.XIB" version="3.0" toolsVersion="23504" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" useTraitCollections="YES" colorMatched="YES">
                <device id="retina6_12" orientation="portrait" appearance="light"/>
                <dependencies>
                    <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="23506"/>
                    <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
                </dependencies>
                <objects>
                    <placeholder placeholderIdentifier="IBFilesOwner" id="-1" userLabel="File's Owner"/>
                    <placeholder placeholderIdentifier="IBFirstResponder" id="-2" customClass="UIResponder"/>
                    <view contentMode="scaleToFill" id="iN0-l3-epB">
                        <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                        <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                        <color key="backgroundColor" systemColor="systemBackgroundColor"/>
                    </view>
                </objects>
                <resources>
                    <systemColor name="systemBackgroundColor">
                        <color white="1" alpha="1" colorSpace="custom" customColorSpace="genericGamma22GrayColorSpace"/>
                    </systemColor>
                </resources>
            </document>
            XIB
          end

          def placeholder_for(ext)
            case ext.downcase
            when '.png'
              transparent_png
            when '.gif'
              transparent_gif
            when '.json'
              "{}\n"
            when '.pdf'
              "Placeholder PDF file for CI simulator build.\n"
            when '.strings'
              "\n"
            when '.plist'
              "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<plist version=\"1.0\"><dict/></plist>\n"
            when '.txt'
              "\n"
            when '.html'
              "<html><body></body></html>\n"
            when '.xib'
              placeholder_xib
            else
              ""
            end
          end

          supported_extensions = [
            '.png',
            '.gif',
            '.json',
            '.pdf',
            '.strings',
            '.plist',
            '.txt',
            '.html',
            '.xib'
          ]

          created = []
          replaced = []
          skipped = []

          resources = target.resources_build_phase.files_references.compact

          resources.each do |ref|
            begin
              real_path = ref.real_path
            rescue => e
              skipped << "#{ref.display_name}: #{e.message}"
              next
            end

            next unless real_path

            full_path = Pathname.new(real_path.to_s).expand_path
            ext = full_path.extname.downcase

            next unless supported_extensions.include?(ext)
            next unless full_path.to_s.start_with?(repo_root.to_s)

            if full_path.exist?
              if ext == '.png' && !valid_png?(full_path.to_s)
                File.binwrite(full_path.to_s, transparent_png)
                replaced << full_path.relative_path_from(repo_root).to_s
              end
              next
            end

            FileUtils.mkdir_p(full_path.dirname.to_s)
            File.binwrite(full_path.to_s, placeholder_for(ext))
            created << full_path.relative_path_from(repo_root).to_s
          end

          puts "Created missing resource placeholders: #{created.length}"
          created.each { |path| puts "Created: #{path}" }

          puts "Replaced invalid PNG resources: #{replaced.length}"
          replaced.each { |path| puts "Replaced invalid PNG: #{path}" }

          if skipped.any?
            puts "Skipped unresolved resource references:"
            skipped.each { |item| puts "Skipped: #{item}" }
          end
          RUBY

      - name: List schemes
        run: |
          xcodebuild -workspace BuguLive.xcworkspace -list

      - name: Build for iOS Simulator
        run: |
          touch ios-build.log
          rm -rf build.xcresult
          rm -f xcresult.json
          set +e

          xcodebuild \
            -workspace BuguLive.xcworkspace \
            -scheme BuguLive \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            EXCLUDED_ARCHS="" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            VALID_ARCHS=arm64 \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_COMPILATION_MODE=singlefile \
            SWIFT_WHOLE_MODULE_OPTIMIZATION=NO \
            SWIFT_ENABLE_BATCH_MODE=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER=NO \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            -jobs 1 \
            -resultBundlePath build.xcresult \
            clean build 2>&1 | tee ios-build.log

          BUILD_STATUS=${PIPESTATUS[0]}
          echo "$BUILD_STATUS" > build-status.txt
          exit 0

      - name: Print Xcode error summary
        if: always()
        run: |
          echo "================ XCODE ERROR SUMMARY ================"

          if [ -f ios-build.log ]; then
            echo ""
            echo "---- Direct log errors ----"
            grep -n -i -E "error:|fatal error:|BUILD FAILED|framework not found|file not found|No such module|Undefined symbols|Command .* failed|unsupported option|No such file or directory|ld:|clang: error|Build input file cannot be found|SwiftCompile|EmitSwiftModule|SwiftEmitModule|cannot find|has no member|ambiguous|consecutive statements|expected declaration|use of unresolved identifier|failed with a nonzero exit code|pngcrush|Not a PNG file|PhaseScriptExecution|Command SwiftCompile|GeneratedAssetSymbols|QMapKit|QMap" ios-build.log | tail -700 || true
          else
            echo "ios-build.log was not created."
          fi

          echo ""
          echo "---- Swift-specific surrounding context ----"

          if [ -f ios-build.log ]; then
            grep -n -i -A 12 -B 12 -E "cannot find|No such module|has no member|ambiguous|use of unresolved identifier|expected declaration|consecutive statements|SwiftCompile|Command SwiftCompile|failed with a nonzero exit code|GeneratedAssetSymbols|QMapKit|QMap" ios-build.log | tail -1000 || true
          else
            echo "ios-build.log was not created."
          fi

          echo ""
          echo "---- xcresult issues ----"

          if [ -d build.xcresult ]; then
            xcrun xcresulttool get --legacy --format json --path build.xcresult > xcresult.json 2>/dev/null || \
            xcrun xcresulttool get --format json --path build.xcresult > xcresult.json 2>/dev/null || true

            if [ -f xcresult.json ]; then
              python3 - <<'PY'
          import json

          def get_value(value):
              if isinstance(value, dict) and "_value" in value:
                  return value.get("_value")
              return value

          def walk(obj):
              if isinstance(obj, dict):
                  message = get_value(obj.get("message"))
                  document = obj.get("documentLocationInCreatingWorkspace") or obj.get("documentLocation")

                  if message:
                      print("ISSUE:", message)

                  if document:
                      print("LOCATION:", document)

                  for value in obj.values():
                      walk(value)

              elif isinstance(obj, list):
                  for item in obj:
                      walk(item)

          try:
              with open("xcresult.json", "r", encoding="utf-8") as f:
                  data = json.load(f)
              walk(data)
          except Exception as e:
              print("Could not parse xcresult:", e)
          PY
            else
              echo "Could not export xcresult.json"
            fi
          else
            echo "build.xcresult was not created."
          fi

          echo "====================================================="

      - name: Fail if build failed
        if: always()
        run: |
          if [ ! -f build-status.txt ]; then
            echo "build-status.txt was not created. A previous step failed before xcodebuild."
            exit 1
          fi

          STATUS=$(cat build-status.txt)

          if [ "$STATUS" -eq 0 ]; then
            echo "Build succeeded."
            exit 0
          fi

          echo "Build failed or did not run. Status: $STATUS"
          exit "$STATUS"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: |
            ios-build.log
            xcresult.json
          if-no-files-found: warn
