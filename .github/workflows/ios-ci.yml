name: iOS CI

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-simulator:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show tool versions
        run: |
          xcodebuild -version
          ruby -v
          pod --version || true
          git lfs version || true

      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document
          pod --version

      - name: Install Pods
        run: |
          rm -f Podfile.lock
          rm -f Pods/Manifest.lock
          pod install --repo-update

      - name: Fix project paths and missing CI resources
        run: |
          set -e

          echo "===== Fix voice-room Chinese path ====="
          EXPECTED_DIR="BuguLive/Class/语音房间"
          FOUND_JSON=$(find "BuguLive/Class" -path "*/model/room_json.json" -print -quit || true)

          echo "Found room_json at: $FOUND_JSON"

          if [ -n "$FOUND_JSON" ]; then
            SOURCE_DIR=$(dirname "$(dirname "$FOUND_JSON")")
            echo "Source voice room dir: $SOURCE_DIR"
            echo "Expected voice room dir: $EXPECTED_DIR"

            if [ "$SOURCE_DIR" != "$EXPECTED_DIR" ]; then
              mkdir -p "$EXPECTED_DIR"
              cp -R "$SOURCE_DIR"/. "$EXPECTED_DIR"/
              echo "Copied voice-room files to expected Chinese folder path."
            fi
          fi

          if [ -d "$EXPECTED_DIR/model" ]; then
            ls -la "$EXPECTED_DIR/model"
          else
            echo "Warning: $EXPECTED_DIR/model does not exist"
          fi

          echo "===== Create missing UMeng PDF placeholder ====="
          PDF_DIR="BuguLive/Others/Vendors/UMengs/common/common_ios_7.3.5"
          PDF_FILE="$PDF_DIR/iOS集成升级必读.pdf"

          mkdir -p "$PDF_DIR"

          if [ ! -f "$PDF_FILE" ]; then
            echo "Creating placeholder PDF: $PDF_FILE"
            printf '%s\n' "Placeholder PDF file for CI simulator build." > "$PDF_FILE"
          else
            echo "Exists: $PDF_FILE"
          fi

          ls -la "$PDF_DIR"

          echo "===== Create missing BogoShopKit PNG placeholders automatically ====="

          python3 - <<'PY'
          import os
          import re
          import struct
          import zlib
          from pathlib import Path

          project_file = Path("BuguLive.xcodeproj/project.pbxproj")
          asset_base = Path("BuguLive/Class/Pod/BogoShopKit/BogoShopKit/Assets")

          def png_chunk(tag: bytes, data: bytes) -> bytes:
              return (
                  struct.pack(">I", len(data)) +
                  tag +
                  data +
                  struct.pack(">I", zlib.crc32(tag + data) & 0xffffffff)
              )

          def make_transparent_png(width: int = 1, height: int = 1) -> bytes:
              raw = b"".join(
                  b"\x00" + b"\x00\x00\x00\x00" * width
                  for _ in range(height)
              )
              return (
                  b"\x89PNG\r\n\x1a\n" +
                  png_chunk(b"IHDR", struct.pack(">IIBBBBB", width, height, 8, 6, 0, 0, 0)) +
                  png_chunk(b"IDAT", zlib.compress(raw)) +
                  png_chunk(b"IEND", b"")
              )

          def collect_bogoshopkit_pngs() -> list[str]:
              names = set()

              if project_file.exists():
                  text = project_file.read_text(errors="ignore")

                  # Capture direct resource names ending with .png in the Xcode project file.
                  for match in re.findall(r"([^/;\"=]+?\.png)", text):
                      if any(token in match for token in [
                          "身份证",
                          "暂无商品",
                          "收货地址",
                          "BogoShop",
                          "商品",
                          "地址",
                      ]):
                          names.add(match.strip())

                  # Capture paths that include the BogoShopKit asset directory.
                  for match in re.findall(r"BogoShopKit/BogoShopKit/Assets/([^;\"=]+?\.png)", text):
                      names.add(match.strip())

              # Known files already seen in CI errors.
              names.update([
                  "身份证头像面@3x.png",
                  "身份证头像面@2x.png",
                  "身份证头像面.png",
                  "身份证国徽面@3x.png",
                  "身份证国徽面@2x.png",
                  "身份证国徽面.png",
                  "暂无商品_空状态@3x.png",
                  "暂无商品_空状态@2x.png",
                  "暂无商品_空状态.png",
                  "收货地址_选择@3x.png",
                  "收货地址_选择@2x.png",
              ])

              return sorted(names)

          asset_base.mkdir(parents=True, exist_ok=True)
          png_data = make_transparent_png()
          png_names = collect_bogoshopkit_pngs()

          print(f"Detected {len(png_names)} BogoShopKit PNG placeholder candidates")

          for name in png_names:
              path = asset_base / name
              if not path.exists():
                  print(f"Creating placeholder PNG: {path}")
                  path.write_bytes(png_data)
              else:
                  print(f"Exists: {path}")
          PY

          ls -la "BuguLive/Class/Pod/BogoShopKit/BogoShopKit/Assets"

      - name: List schemes
        run: xcodebuild -workspace BuguLive.xcworkspace -list

      - name: Build for iOS Simulator
        run: |
          touch ios-build.log
          set +e

          xcodebuild \
            -workspace BuguLive.xcworkspace \
            -scheme BuguLive \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            EXCLUDED_ARCHS="" \
            'ARCHS=$(ARCHS_STANDARD)' \
            clean build 2>&1 | tee ios-build.log

          echo ${PIPESTATUS[0]} > build-status.txt

      - name: Print Xcode error summary
        if: always()
        run: |
          echo "================ XCODE ERROR SUMMARY ================"
          grep -n -i -E "error:|fatal error:|BUILD FAILED|framework not found|file not found|No such module|Undefined symbols|Command .* failed|unsupported option|No such file or directory|ld:|clang: error|Build input file cannot be found" ios-build.log | tail -150 || true
          echo "====================================================="

      - name: Fail if build failed
        if: always()
        run: |
          STATUS=$(cat build-status.txt)
          exit $STATUS

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ios-build.log
          if-no-files-found: warn
