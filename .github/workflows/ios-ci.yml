name: iOS CI

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-simulator:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: |
          git lfs pull

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show tool versions
        run: |
          xcodebuild -version
          ruby -v
          pod --version || true
          git lfs version || true

      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document
          pod --version

      - name: Install Pods
        run: |
          rm -f Podfile.lock
          rm -f Pods/Manifest.lock
          pod install --repo-update

      - name: Fix project resources for CI
        run: |
          set -e

          echo "===== Fix mojibake Chinese voice room path ====="

          EXPECTED_DIR="BuguLive/Class/语音房间"
          FOUND_JSON=$(find "BuguLive/Class" -path "*/model/room_json.json" -print -quit || true)

          echo "Found room_json at: $FOUND_JSON"

          if [ -n "$FOUND_JSON" ]; then
            SOURCE_DIR=$(dirname "$(dirname "$FOUND_JSON")")
            echo "Source voice room dir: $SOURCE_DIR"
            echo "Expected voice room dir: $EXPECTED_DIR"

            if [ "$SOURCE_DIR" != "$EXPECTED_DIR" ]; then
              mkdir -p "$EXPECTED_DIR"
              cp -R "$SOURCE_DIR"/. "$EXPECTED_DIR"/
              echo "Copied voice room files to expected Chinese folder path."
            fi
          fi

          if [ -d "$EXPECTED_DIR/model" ]; then
            ls -la "$EXPECTED_DIR/model"
          else
            echo "Warning: expected model folder does not exist: $EXPECTED_DIR/model"
          fi

          echo "===== Create missing UMeng PDF placeholder ====="

          PDF_DIR="BuguLive/Others/Vendors/UMengs/common/common_ios_7.3.5"
          PDF_FILE="$PDF_DIR/iOS集成升级必读.pdf"

          mkdir -p "$PDF_DIR"

          if [ ! -f "$PDF_FILE" ]; then
            echo "Creating placeholder PDF: $PDF_FILE"
            printf '%s\n' "Placeholder PDF file for CI simulator build." > "$PDF_FILE"
          else
            echo "Exists: $PDF_FILE"
          fi

          ls -la "$PDF_DIR"

          echo "===== Create missing BogoShopKit PNG placeholders ====="

          python3 - <<'PY'
          import os
          import re
          import struct
          import zlib
          from pathlib import Path

          project_file = Path("BuguLive.xcodeproj/project.pbxproj")
          asset_base = Path("BuguLive/Class/Pod/BogoShopKit/BogoShopKit/Assets")

          def has_cjk(text: str) -> bool:
              return any("\u4e00" <= ch <= "\u9fff" for ch in text)

          def png_chunk(tag: bytes, data: bytes) -> bytes:
              return (
                  struct.pack(">I", len(data)) +
                  tag +
                  data +
                  struct.pack(">I", zlib.crc32(tag + data) & 0xffffffff)
              )

          def make_transparent_png(width: int = 1, height: int = 1) -> bytes:
              raw = b"".join(
                  b"\x00" + b"\x00\x00\x00\x00" * width
                  for _ in range(height)
              )

              return (
                  b"\x89PNG\r\n\x1a\n" +
                  png_chunk(
                      b"IHDR",
                      struct.pack(">IIBBBBB", width, height, 8, 6, 0, 0, 0)
                  ) +
                  png_chunk(b"IDAT", zlib.compress(raw)) +
                  png_chunk(b"IEND", b"")
              )

          def collect_png_names_from_project() -> set[str]:
              names = set()

              if not project_file.exists():
                  print(f"Warning: project file not found: {project_file}")
                  return names

              text = project_file.read_text(errors="ignore")

              patterns = [
                  r'path = "?([^";]+\.png)"?;',
                  r'name = "?([^";]+\.png)"?;',
                  r'BogoShopKit/BogoShopKit/Assets/([^";]+\.png)',
              ]

              for pattern in patterns:
                  for match in re.findall(pattern, text):
                      name = os.path.basename(match.strip())
                      if name.endswith(".png") and has_cjk(name):
                          names.add(name)

              return names

          known_missing = {
              "身份证头像面@3x.png",
              "身份证头像面@2x.png",
              "身份证头像面.png",
              "身份证国徽面@3x.png",
              "身份证国徽面@2x.png",
              "身份证国徽面.png",
              "暂无商品_空状态@3x.png",
              "暂无商品_空状态@2x.png",
              "暂无商品_空状态.png",
              "收货地址_选择@3x.png",
              "收货地址_选择@2x.png",
              "收货地址_选择.png",
              "收货地址_修改@3x.png",
              "收货地址_修改@2x.png",
              "收货地址_修改.png",
              "提交订单_店铺@3x.png",
              "提交订单_店铺@2x.png",
              "提交订单_店铺.png",
          }

          asset_base.mkdir(parents=True, exist_ok=True)

          png_names = collect_png_names_from_project()
          png_names.update(known_missing)

          print(f"Total BogoShopKit PNG placeholders to check: {len(png_names)}")

          png_data = make_transparent_png()

          for name in sorted(png_names):
              path = asset_base / name

              if not path.exists():
                  print(f"Creating placeholder PNG: {path}")
                  path.write_bytes(png_data)
              else:
                  print(f"Exists: {path}")
          PY

          echo "===== BogoShopKit Assets after placeholder generation ====="
          ls -la "BuguLive/Class/Pod/BogoShopKit/BogoShopKit/Assets"

      - name: List schemes
        run: |
          xcodebuild -workspace BuguLive.xcworkspace -list

      - name: Build for iOS Simulator
        run: |
          touch ios-build.log
          set +e

          xcodebuild \
            -workspace BuguLive.xcworkspace \
            -scheme BuguLive \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            EXCLUDED_ARCHS="" \
            'ARCHS=$(ARCHS_STANDARD)' \
            clean build 2>&1 | tee ios-build.log

          echo ${PIPESTATUS[0]} > build-status.txt

      - name: Print Xcode error summary
        if: always()
        run: |
          echo "================ XCODE ERROR SUMMARY ================"
          grep -n -i -E "error:|fatal error:|BUILD FAILED|framework not found|file not found|No such module|Undefined symbols|Command .* failed|unsupported option|No such file or directory|ld:|clang: error|Build input file cannot be found" ios-build.log | tail -200 || true
          echo "====================================================="

      - name: Fail if build failed
        if: always()
        run: |
          STATUS=$(cat build-status.txt)
          exit $STATUS

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ios-build.log
          if-no-files-found: warn
