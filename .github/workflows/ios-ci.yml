name: iOS CI

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-simulator:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show tool versions
        run: |
          xcodebuild -version
          ruby -v
          pod --version || true

      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document
          pod --version

      - name: Install Pods
        run: |
          rm -f Podfile.lock
          rm -f Pods/Manifest.lock
          pod install --repo-update

      - name: Fix mojibake Chinese folder path
        run: |
          set -e

          EXPECTED_DIR="BuguLive/Class/语音房间"
          FOUND_JSON=$(find "BuguLive/Class" -path "*/model/room_json.json" -print -quit)

          echo "Found room_json at: $FOUND_JSON"

          if [ -n "$FOUND_JSON" ]; then
            SOURCE_DIR=$(dirname "$(dirname "$FOUND_JSON")")
            echo "Source voice room dir: $SOURCE_DIR"
            echo "Expected voice room dir: $EXPECTED_DIR"

            if [ "$SOURCE_DIR" != "$EXPECTED_DIR" ]; then
              mkdir -p "$EXPECTED_DIR"
              cp -R "$SOURCE_DIR"/. "$EXPECTED_DIR"/
              echo "Copied files to expected Chinese folder path."
            fi
          fi

          echo "Checking expected model folder:"
          ls -la "$EXPECTED_DIR/model"

      - name: List schemes
        run: xcodebuild -workspace BuguLive.xcworkspace -list

      - name: Build for iOS Simulator
        run: |
          touch ios-build.log
          set -o pipefail
          xcodebuild \
            -workspace BuguLive.xcworkspace \
            -scheme BuguLive \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            clean build 2>&1 | tee ios-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ios-build.log
          if-no-files-found: warn
