name: iOS CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator:
    runs-on: macos-14
    timeout-minutes: 90

    env:
      COCOAPODS_DISABLE_STATS: true
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Show tool versions
        run: |
          xcodebuild -version
          ruby -v
          gem -v
          git lfs version

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('Podfile.lock', 'Podfile') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document
          pod --version

      - name: Install Pods (with retry)
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "pod install attempt $attempt/3"
            if pod install --repo-update; then
              echo "pod install succeeded"
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "pod install failed after 3 attempts"
              exit 1
            fi

            sleep 20
          done

      - name: List schemes
        run: xcodebuild -workspace BuguLive.xcworkspace -list

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          rm -rf build.xcresult

          xcodebuild \
            -workspace BuguLive.xcworkspace \
            -scheme BuguLive \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            -resultBundlePath build.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            clean build 2>&1 | tee ios-build.log

      - name: Print error summary
        if: failure()
        run: |
          echo "================ XCODE ERROR SUMMARY ================"
          grep -n -i -E "error:|fatal error:|BUILD FAILED|framework not found|file not found|No such module|Undefined symbols|ld:|clang: error|Command .* failed" ios-build.log | tail -500 || true
          echo "====================================================="

      - name: Export xcresult JSON
        if: always()
        run: |
          if [ -d build.xcresult ]; then
            xcrun xcresulttool get --legacy --format json --path build.xcresult > xcresult.json 2>/dev/null || \
            xcrun xcresulttool get --format json --path build.xcresult > xcresult.json 2>/dev/null || true
          fi

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifacts
          path: |
            ios-build.log
            xcresult.json
            build.xcresult
          if-no-files-found: warn
