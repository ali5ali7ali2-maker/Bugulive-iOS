name: iOS CI

on:
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator:
    runs-on: macos-14
    timeout-minutes: 70

    env:
      COCOAPODS_DISABLE_STATS: true
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare CI status files
        run: |
          touch ios-build.log
          echo 1 > build-status.txt

      - name: Pull Git LFS files
        run: |
          git lfs pull

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show tool versions
        run: |
          xcodebuild -version
          ruby -v
          gem -v
          pod --version || true
          git lfs version || true

      - name: Configure Git network retry settings
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('Podfile') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods tools
        run: |
          gem install cocoapods --no-document
          gem install xcodeproj --no-document
          pod --version

      - name: Install Pods with CDN retry
        run: |
          set +e

          echo "===== Current Podfile source ====="
          grep -n "source" Podfile || true

          echo "===== Remove old GitHub CocoaPods specs repos if they exist ====="
          pod repo remove cocoapods || true
          pod repo remove master || true
          rm -rf ~/.cocoapods/repos/cocoapods
          rm -rf ~/.cocoapods/repos/master

          for attempt in 1 2 3; do
            echo "===== pod install attempt $attempt of 3 ====="

            rm -f Podfile.lock
            rm -f Pods/Manifest.lock

            pod install --verbose

            POD_STATUS=$?

            if [ "$POD_STATUS" -eq 0 ]; then
              echo "pod install succeeded"
              exit 0
            fi

            echo "pod install failed with status $POD_STATUS"

            if [ "$attempt" -lt 3 ]; then
              echo "Retrying after network issue..."
              sleep 30
            fi
          done

          echo "pod install failed after 3 attempts"
          exit 1

      - name: Repair project build settings and resources for CI
        run: |
          set -e

          echo "===== Patch project build settings for Xcode 16 CI ====="

          ruby <<'RUBY'
          require 'xcodeproj'

          def patch_project_build_settings(project_path)
            return unless File.exist?(project_path)

            project = Xcodeproj::Project.open(project_path)

            project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '12.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['SWIFT_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
                config.build_settings['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
                config.build_settings['COMPILER_INDEX_STORE_ENABLE'] = 'NO'
                config.build_settings['ONLY_ACTIVE_ARCH'] = 'YES'
                config.build_settings['ARCHS'] = 'arm64'
                config.build_settings['EXCLUDED_ARCHS'] = ''
                config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
                config.build_settings['ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS'] = 'NO'
                config.build_settings['ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS'] = 'NO'
              end
            end

            project.save
            puts "Patched project build settings: #{project_path}"
          end

          patch_project_build_settings('BuguLive.xcodeproj')
          patch_project_build_settings('UGCKit/UGCKit.xcodeproj')
          patch_project_build_settings('UGCKit/Source/BeautyPanel/TCBeautyPanel/TCBeautyPanel.xcodeproj')
          RUBY

          echo "===== Fix mojibake Chinese voice-room path ====="

          EXPECTED_DIR="BuguLive/Class/语音房间"
          FOUND_JSON=$(find "BuguLive/Class" -path "*/model/room_json.json" -print -quit || true)

          echo "Found room_json at: $FOUND_JSON"

          if [ -n "$FOUND_JSON" ]; then
            SOURCE_DIR=$(dirname "$(dirname "$FOUND_JSON")")
            echo "Source voice room dir: $SOURCE_DIR"
            echo "Expected voice room dir: $EXPECTED_DIR"

            if [ "$SOURCE_DIR" != "$EXPECTED_DIR" ]; then
              mkdir -p "$EXPECTED_DIR"
              cp -R "$SOURCE_DIR"/. "$EXPECTED_DIR"/
              echo "Copied voice-room files to expected Chinese folder path."
            fi
          fi

          echo "===== Create clean QMapKit simulator stub framework for CI ====="

          QMAP_BASE="BuguLive/Others/Vendors/QMap"
          QMAP_FRAMEWORK="$QMAP_BASE/QMapKit.framework"

          mkdir -p "$QMAP_FRAMEWORK"

          # Important fix:
          # Some old repositories contain Headers or Modules as files/symlinks.
          # mkdir -p fails when the path already exists as a file.
          rm -rf "$QMAP_FRAMEWORK/Headers"
          rm -rf "$QMAP_FRAMEWORK/Modules"
          rm -rf "$QMAP_FRAMEWORK/QMapKit"

          mkdir -p "$QMAP_FRAMEWORK/Headers"
          mkdir -p "$QMAP_FRAMEWORK/Modules"

          cat > "$QMAP_FRAMEWORK/Headers/QMapKit.h" <<'EOF'
#import <Foundation/Foundation.h>
#import <UIKit/UIKit.h>
#import <CoreLocation/CoreLocation.h>

#ifndef QMAPKIT_STUB_H
#define QMAPKIT_STUB_H

typedef NS_ENUM(NSInteger, QMapType) {
    QMapTypeStandard = 0,
    QMapTypeSatellite = 1
};

typedef NS_ENUM(NSInteger, QUserTrackingMode) {
    QUserTrackingModeNone = 0,
    QUserTrackingModeFollow = 1,
    QUserTrackingModeFollowWithHeading = 2
};

typedef NS_ENUM(NSInteger, QAnnotationViewDragState) {
    QAnnotationViewDragStateNone = 0,
    QAnnotationViewDragStateStarting = 1,
    QAnnotationViewDragStateDragging = 2,
    QAnnotationViewDragStateCanceling = 3,
    QAnnotationViewDragStateEnding = 4
};

@protocol QAnnotation <NSObject>
@property (nonatomic, readonly) CLLocationCoordinate2D coordinate;
@optional
@property (nonatomic, readonly, copy) NSString *title;
@property (nonatomic, readonly, copy) NSString *subtitle;
@end

@class QMapView;
@class QAnnotationView;
@class QPointAnnotation;
@class QPinAnnotationView;
@class QUserLocation;
@class QPolyline;
@class QPolygon;
@class QCircle;
@class QOverlayRenderer;
@class QOverlayPathRenderer;
@class QMapServices;
@class QMapSearch;
@class QMapLocationManager;

@protocol QMapViewDelegate <NSObject>
@optional
- (void)mapView:(QMapView *)mapView didSelectAnnotationView:(QAnnotationView *)view;
- (void)mapView:(QMapView *)mapView didDeselectAnnotationView:(QAnnotationView *)view;
- (void)mapView:(QMapView *)mapView didUpdateUserLocation:(QUserLocation *)userLocation;
