name: iOS CI AutoFix

on:
  workflow_run:
    workflows: ["iOS CI"]
    types: [completed]

permissions:
  contents: write
  actions: write

jobs:
  autofix-known-failures:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Normalize known non-ASCII folder names
        run: |
          python3 - << 'PY'
          import os
          import unicodedata
          from pathlib import Path

          def nfc(s: str) -> str:
              return unicodedata.normalize('NFC', s)

          fixes = [
              ('BuguLive/Class/Sections', 'DT_Controller(', 'DT_Controller(动态)'),
              ('BuguLive/Class/Sections', 'YounthMode(', 'YounthMode(青少年模式)'),
              ('BuguLive/Class/Sections/Home/V3NewUIController', 'BogoNewNoble(', 'BogoNewNoble(贵族)'),
              ('BuguLive/Class/Sections/Home/V3NewUIController', 'BogoSquare(', 'BogoSquare(广场)'),
              ('BuguLive/Class/Sections/Login', 'Register(', 'Register(注册)'),
              ('BuguLive/Class/Live/LiveUI/View/OtherView', 'Shop(', 'Shop(购物车)'),
              ('BuguLive/Class/Live/LiveUI/View/OtherView', 'VIP(', 'VIP(贵族列表)'),
              ('BuguLive/Class/Live/LiveUI/View/OtherView', 'Wish(', 'Wish(心愿单)'),
          ]

          for parent, prefix, correct in fixes:
              parent_path = Path(parent)
              if not parent_path.is_dir():
                  continue
              for entry in parent_path.iterdir():
                  name = nfc(entry.name)
                  if not name.startswith(prefix):
                      continue
                  if name == correct:
                      break
                  target = parent_path / correct
                  if target.exists():
                      break
                  entry.rename(target)
                  print(f'renamed: {entry} -> {target}')
                  break
          PY

      - name: Fix known pbxproj path corruption
        run: |
          python3 - << 'PY'
          from pathlib import Path

          pbx = Path('BuguLive.xcodeproj/project.pbxproj')
          text = pbx.read_text(encoding='utf-8', errors='ignore')
          text2 = text.replace('/* Register(注册 */', '/* Register(注册) */')
          text2 = text2.replace('path = "Register(注册";', 'path = "Register(注册)";')
          if text2 != text:
              pbx.write_text(text2, encoding='utf-8')
              print('updated project.pbxproj')
          PY

      - name: Detect changes
        id: detect
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push autofix
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: autofix known non-ascii path mismatches"
          git push origin HEAD:main

      - name: Rerun failed jobs once when no repo fix was needed
        if: steps.detect.outputs.changed != 'true' && github.event.workflow_run.run_attempt < 2
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.reRunWorkflowFailedJobs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            core.info(`Triggered failed-jobs rerun for run ${context.payload.workflow_run.id}`);
